<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basketball Player Classifier 🏀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c10;
      --surface:   #13161e;
      --card:      #1a1e2a;
      --border:    #2a2f3d;
      --orange:    #f5842a;
      --orange2:   #ff6b00;
      --gold:      #ffc947;
      --blue:      #4a90d9;
      --red:       #e74c3c;
      --text:      #e8eaf0;
      --muted:     #7a8099;
      --radius:    14px;
      --glow:      0 0 40px rgba(245,132,42,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background texture ──────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(245,132,42,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(74,144,217,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Court lines decoration ──────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 2px; height: 100vh;
      background: linear-gradient(to bottom, transparent, rgba(245,132,42,0.06) 30%, rgba(245,132,42,0.06) 70%, transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ──────────────────────────────────────────────────────── */
    .container {
      position: relative; z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 3rem 0 2.5rem;
      position: relative;
    }

    .ball-icon {
      font-size: 3.5rem;
      display: block;
      animation: bounce 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(245,132,42,0.5));
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #f5842a 0%, #ffc947 60%, #ff6b00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin: 0.5rem 0 0.3rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .badge {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.25rem 0.9rem;
      border-radius: 20px;
      background: rgba(245,132,42,0.12);
      border: 1px solid rgba(245,132,42,0.3);
      color: var(--orange);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Card ────────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--glow);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--orange), var(--gold), var(--orange));
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      color: var(--orange);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ── Form Grid ───────────────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    label span.full-name {
      display: block;
      font-size: 0.7rem;
      font-weight: 400;
      color: #555e7a;
      text-transform: none;
      letter-spacing: 0;
      margin-top: 1px;
    }

    input[type="number"], input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.6rem 0.85rem;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; }

    input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(245,132,42,0.15);
    }

    /* ── Optional fields section ─────────────────────────────────────── */
    .optional-toggle {
      margin-top: 1.5rem;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      user-select: none;
      width: fit-content;
      transition: color 0.2s;
    }
    .optional-toggle:hover { color: var(--orange); }
    .optional-toggle .arrow {
      transition: transform 0.3s;
      display: inline-block;
    }
    .optional-toggle.open .arrow { transform: rotate(90deg); }

    .optional-fields {
      display: none;
      margin-top: 1rem;
    }
    .optional-fields.open { display: block; }

    /* ── Submit button ───────────────────────────────────────────────── */
    .btn-predict {
      margin-top: 2rem;
      width: 100%;
      padding: 1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.1em;
      color: #0a0c10;
      background: linear-gradient(135deg, #f5842a, #ffc947);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      box-shadow: 0 4px 24px rgba(245,132,42,0.35);
    }

    .btn-predict:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,132,42,0.5);
      filter: brightness(1.05);
    }

    .btn-predict:active { transform: translateY(0); }
    .btn-predict:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Result ──────────────────────────────────────────────────────── */
    #result-section {
      margin-top: 2rem;
      display: none;
    }

    .result-card {
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      border: 2px solid;
      position: relative;
      overflow: hidden;
    }

    .result-card::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.06;
      background: radial-gradient(circle at 50% 50%, white, transparent 70%);
    }

    .result-emoji {
      font-size: 3.5rem;
      display: block;
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .result-label-he {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 0.05em;
      margin: 0.3rem 0 0.1rem;
    }

    .result-label-en {
      font-size: 0.9rem;
      opacity: 0.7;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .confidence-row {
      margin-top: 1.2rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .confidence-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.05em;
    }

    /* ── Probability bars ─────────────────────────────────────────────── */
    .prob-bars {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .prob-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 0.8rem;
    }

    .prob-label { width: 120px; text-align: right; color: var(--muted); flex-shrink: 0; }

    .prob-bar-wrap {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .prob-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .prob-pct { width: 42px; font-weight: 700; color: var(--text); font-size: 0.8rem; }

    /* ── Error ───────────────────────────────────────────────────────── */
    .error-card {
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      color: #e74c3c;
      font-size: 0.9rem;
      margin-top: 1rem;
      display: none;
    }

    /* ── Loader ──────────────────────────────────────────────────────── */
    .loader {
      display: none;
      text-align: center;
      padding: 2rem;
    }

    .loader-ball {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--gold));
      margin: 0 auto;
      animation: dribble 0.6s ease-in-out infinite alternate;
    }

    @keyframes dribble {
      from { transform: translateY(-15px); }
      to   { transform: translateY(0) scaleX(1.2) scaleY(0.85); }
    }

    /* ── Footer ──────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.78rem;
    }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 500px) {
      .form-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<body>
<div class="container">

  <!-- ── Header ── -->
  <header>
    <span class="ball-icon">🏀</span>
    <h1>Basketball Scout AI</h1>
    <p class="subtitle">סיווג שחקנים בעזרת רשת נוירונים</p>
    <span class="badge">דיוק 91% · Neural Network</span>
  </header>

  <!-- ── Form card ── -->
  <div class="card">
    <div class="section-title">⚡ הכנס נתוני שחקן</div>

    <div class="form-grid" id="main-fields">

      <div class="field">
        <label>MIN <span class="full-name">דקות משחק</span></label>
        <input type="number" id="MIN" min="0" step="0.1" placeholder="28.5" />
      </div>

      <div class="field">
        <label>3PM <span class="full-name">קליעות 3 נקודות</span></label>
        <input type="number" id="3PM" min="0" step="0.1" placeholder="1.8" />
      </div>

      <div class="field">
        <label>3PA <span class="full-name">ניסיונות 3 נקודות</span></label>
        <input type="number" id="3PA" min="0" step="0.1" placeholder="4.5" />
      </div>

      <div class="field">
        <label>FTM <span class="full-name">קליעות קו עונשין</span></label>
        <input type="number" id="FTM" min="0" step="0.1" placeholder="3.2" />
      </div>

      <div class="field">
        <label>FTA <span class="full-name">ניסיונות קו עונשין</span></label>
        <input type="number" id="FTA" min="0" step="0.1" placeholder="4.1" />
      </div>

      <div class="field">
        <label>TOV <span class="full-name">אבדות כדור</span></label>
        <input type="number" id="TOV" min="0" step="0.1" placeholder="2.3" />
      </div>

      <div class="field">
        <label>PF <span class="full-name">פאולים אישיים</span></label>
        <input type="number" id="PF" min="0" step="0.1" placeholder="2.8" />
      </div>

      <div class="field">
        <label>ORB <span class="full-name">ריבאונדים התקפיים</span></label>
        <input type="number" id="ORB" min="0" step="0.1" placeholder="0.9" />
      </div>

      <div class="field">
        <label>REB <span class="full-name">ריבאונדים סה"כ</span></label>
        <input type="number" id="REB" min="0" step="0.1" placeholder="5.5" />
      </div>

      <div class="field">
        <label>AST <span class="full-name">בישורים</span></label>
        <input type="number" id="AST" min="0" step="0.1" placeholder="4.2" />
      </div>

      <div class="field">
        <label>STL <span class="full-name">גניבות כדור</span></label>
        <input type="number" id="STL" min="0" step="0.1" placeholder="1.2" />
      </div>

      <div class="field">
        <label>BLK <span class="full-name">חסימות</span></label>
        <input type="number" id="BLK" min="0" step="0.1" placeholder="0.5" />
      </div>

    </div>

    <!-- Optional fields -->
    <div class="optional-toggle" id="opt-toggle">
      <span class="arrow">▶</span> נתונים פיזיים (אופציונלי)
    </div>

    <div class="optional-fields" id="opt-fields">
      <div class="form-grid">
        <div class="field">
          <label>גובה (cm)</label>
          <input type="number" id="height_cm" min="150" max="230" step="0.5" placeholder="198" />
        </div>
        <div class="field">
          <label>משקל (kg)</label>
          <input type="number" id="weight_kg" min="60" max="160" step="0.5" placeholder="95" />
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <button class="btn-predict" id="predict-btn">🏀 סווג שחקן</button>

    <!-- Error -->
    <div class="error-card" id="error-card"></div>

    <!-- Loader -->
    <div class="loader" id="loader">
      <div class="loader-ball"></div>
      <p style="margin-top:1rem; color:var(--muted); font-size:0.85rem;">מנתח נתונים…</p>
    </div>
  </div>

  <!-- ── Result ── -->
  <div id="result-section">
    <div class="result-card" id="result-card">
      <span class="result-emoji" id="res-emoji"></span>
      <div class="result-label-he" id="res-label-he"></div>
      <div class="result-label-en" id="res-label-en"></div>
      <div class="confidence-row">
        ביטחון המודל:
        <span class="confidence-value" id="res-confidence"></span>%
      </div>
      <div class="prob-bars" id="prob-bars"></div>
    </div>
  </div>

  <footer>
    Built with Flask + TensorFlow &nbsp;·&nbsp; Ido &amp; Paleg Project &nbsp;·&nbsp; 91% Accuracy
  </footer>

</div>

<script>
  // ── Optional fields toggle ─────────────────────────────────────────────
  const optToggle = document.getElementById('opt-toggle');
  const optFields = document.getElementById('opt-fields');
  optToggle.addEventListener('click', () => {
    optToggle.classList.toggle('open');
    optFields.classList.toggle('open');
  });

  // ── Predict ───────────────────────────────────────────────────────────
  const btn         = document.getElementById('predict-btn');
  const loader      = document.getElementById('loader');
  const errorCard   = document.getElementById('error-card');
  const resultSec   = document.getElementById('result-section');

  const FIELD_IDS = ['MIN','3PM','3PA','FTM','FTA','TOV','PF','ORB','REB','AST','STL','BLK'];

  function showError(msg) {
    errorCard.textContent = '⚠️ ' + msg;
    errorCard.style.display = 'block';
  }
  function hideError() { errorCard.style.display = 'none'; }

  btn.addEventListener('click', async () => {
    hideError();
    resultSec.style.display = 'none';

    // Validate
    const payload = {};
    for (const id of FIELD_IDS) {
      const val = document.getElementById(id).value.trim();
      if (val === '') {
        showError(`נא למלא את השדה: ${id}`);
        document.getElementById(id).focus();
        return;
      }
      payload[id] = parseFloat(val);
    }

    // Optional physicals
    const h = document.getElementById('height_cm').value.trim();
    const w = document.getElementById('weight_kg').value.trim();
    if (h) payload['height_cm'] = parseFloat(h);
    if (w) payload['weight_kg'] = parseFloat(w);

    // Send
    btn.disabled = true;
    loader.style.display = 'block';

    try {
      const res  = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        showError(data.error || 'שגיאה בשרת');
        return;
      }

      renderResult(data);

    } catch (err) {
      showError('לא ניתן להתחבר לשרת. ודא ש-Flask פועל.');
    } finally {
      btn.disabled = false;
      loader.style.display = 'none';
    }
  });

  function renderResult(data) {
    const card = document.getElementById('result-card');
    card.style.borderColor  = data.color;
    card.style.background   = hexToRgba(data.color, 0.07);
    card.style.color        = data.color;

    document.getElementById('res-emoji').textContent      = data.emoji;
    document.getElementById('res-label-he').textContent   = data.label_he;
    document.getElementById('res-label-en').textContent   = data.label_en;
    document.getElementById('res-confidence').textContent = data.confidence;

    // Prob bars
    const barColors = { 'Good Player': '#f5a623', 'Average Player': '#4a90d9', 'Below Average': '#e74c3c' };
    const probBars  = document.getElementById('prob-bars');
    const labels    = { 'Good Player': 'שחקן טוב', 'Average Player': 'ממוצע', 'Below Average': 'לא טוב' };
    probBars.innerHTML = '';

    for (const [key, pct] of Object.entries(data.probabilities)) {
      const color = barColors[key] || '#aaa';
      probBars.innerHTML += `
        <div class="prob-row">
          <div class="prob-label">${labels[key] || key}</div>
          <div class="prob-bar-wrap">
            <div class="prob-bar-fill" style="width:0%; background:${color}" data-target="${pct}"></div>
          </div>
          <div class="prob-pct" style="color:${color}">${pct}%</div>
        </div>`;
    }

    resultSec.style.display = 'block';
    resultSec.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // Animate bars
    requestAnimationFrame(() => {
      document.querySelectorAll('.prob-bar-fill').forEach(el => {
        el.style.width = el.dataset.target + '%';
      });
    });
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
</script>
</body>
</html>
